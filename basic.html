<!DOCTYPE html>
<html> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition and Multiplication</title>
</head>
<body>
<h2>Addition and Multiplication</h2>
<label>Enter First Number:</label>
<input type="number" id="num1"><br><br>

<label>Enter Second Number:</label>
<input type="number" id="num2"><br><br>

<button onclick="addNumbers()">Add</button>
<button onclick="multiplyNumbers()">Multiply</button>
<p id="result"></p>
<script>
function addNumbers() {
    var n1 = parseFloat(document.getElementById("num1").value);
    var n2 = parseFloat(document.getElementById("num2").value);

    var sum = n1 + n2;
    
    document.getElementById("result").innerHTML = "Addition Result: " + sum;
}

function multiplyNumbers() {
    var n1 = parseFloat(document.getElementById("num1").value);
    var n2 = parseFloat(document.getElementById("num2").value);

    var product = n1 * n2;

    document.getElementById("result").innerHTML = "Multiplication Result: " + product;
}
</script>

</body>
</html>
